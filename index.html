<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kanban</title>
        <link rel="stylesheet" href="interface.css">
    </head>
    <body>
        <div class="kanban-container">
            <h1>📋 Kanban</h1>
            <div class="form-card">
                <input type="text" id="titulo" placeholder="Título da tarefa" autocomplete="off">
                <textarea id="descricao" placeholder="Descrição (opcional)"></textarea>
                <select id="status">
                    <option value="A_FAZER">🌊 A Fazer</option>
                    <option value="EM_ANDAMENTO">🌀 Em Andamento</option>
                    <option value="CONCLUIDO">✅ Concluído</option>
                </select>
                <button type="button" id="addBtn">+ Adicionar Tarefa</button>
            </div>
            <div class="kanban-board">
                <div class="column" data-status="A_FAZER"><h2>🌊 A Fazer</h2><div class="tasks-container" id="coluna-a-fazer"></div></div>
                <div class="column" data-status="EM_ANDAMENTO"><h2>🌀 Em Andamento</h2><div class="tasks-container" id="coluna-em-andamento"></div></div>
                <div class="column" data-status="CONCLUIDO"><h2>✅ Concluído</h2><div class="tasks-container" id="coluna-concluido"></div></div>
            </div>
            <div class="status-msg" id="statusMsg"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
